name: usps_lot_nav
description: USPS Line of Travel Navigation - Native Flutter Build
version: 1.0.0

environment:
  sdk: ">=2.17.0 <3.0.0"

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.0.0+3
  path_provider: ^2.0.11
  geolocator: ^9.0.2
  flutter_barcode_scanner: ^2.0.0
  permission_handler: ^10.0.0
  zebra_datawedge: ^0.1.0 # Custom plugin hook (optional)

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - data/sample_routes.json
    - guides/field-guide.md
    - guides/staging-guide.md
